name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v1.0.2)'
        required: true
        default: 'v1.0.2'
      title:
        description: 'Release title'
        required: true
        default: 'v1.0.2 — Warm Neutral Light Theme'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build VSIX
        run: npx vsce package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.title }}
          body: |
            ## What's new
            - Redesigned light theme with a warm neutral palette (cream background, amber/orange accents)
            - States: cream fill (`#fce7d8`) with amber stroke (`#d97706`)
            - Background: warm off-white (`#fef7f0`)
            - Edge and text colors tuned for readability on light backgrounds
          files: '*.vsix'
          make_latest: true
